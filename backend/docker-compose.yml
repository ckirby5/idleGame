version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: idle-game-db
    restart: always
    environment:
      POSTGRES_USER: idlegame
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: idlegame_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: